<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒙恩聽障烘焙坊參訪申請</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        body { font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js';

        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBRXTP7MpTGoyq_jm6CHFVGNY1U-zNvpPs",
            authDomain: "deafbakery-visit.firebaseapp.com",
            projectId: "deafbakery-visit",
            storageBucket: "deafbakery-visit.firebasestorage.app",
            messagingSenderId: "150016655038",
            appId: "1:150016655038:web:046f394ecdfcbce9b6a8ef"
        };

        // --- Google Apps Script 網址 ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxaPQRqG8N-5B-ELkDkmwAsCdNbLimK1NfDzEQOCW8m6vLLZ1AXGhK9y_oK2ILOtKN_/exec"; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const COLLECTION_NAME = 'visit_applications';

        const { useState, useEffect } = React;

        // --- 獨立的畫面元件 ---
        
        const HomeView = ({ setView, configError }) => (
            <div className="flex flex-col items-center justify-center min-h-[60vh] text-center space-y-8 animate-fade-in">
                {configError && (
                    <div className="w-full max-w-2xl bg-amber-50 border-l-4 border-amber-500 text-amber-800 p-4 text-left shadow-sm">
                        <p className="font-bold">⚠️ 系統目前處於「演示模式」</p>
                        <p className="text-sm mt-1">{configError}</p>
                    </div>
                )}
                <div className="max-w-2xl px-6">
                    <h1 className="text-4xl font-bold text-gray-800 mb-4">蒙恩聽障烘焙坊</h1>
                    <h2 className="text-2xl text-orange-600 mb-6 font-medium">參訪申請系統</h2>
                    <p className="text-gray-600 mb-8 leading-relaxed">
                        歡迎來到蒙恩！我們提供工廠導覽、志工服務與企業 ESG 合作方案。<br/>
                        請填寫申請表，我們將安排專人帶領您認識聽障就業與烘焙的世界。
                    </p>
                    <div className="flex flex-col sm:flex-row gap-4 justify-center">
                        <button onClick={() => setView('form')} className="px-8 py-4 bg-orange-500 hover:bg-orange-600 text-white rounded-lg text-lg font-bold shadow-lg transition-all transform hover:-translate-y-1">
                            📝 填寫參訪申請
                        </button>
                        <button onClick={() => setView('admin-login')} className="px-8 py-4 bg-white border-2 border-gray-200 hover:border-gray-300 text-gray-700 rounded-lg text-lg font-medium transition-all">
                            🔒 同仁登入後台
                        </button>
                    </div>
                    <div className="mt-12 p-6 bg-orange-50 rounded-xl border border-orange-100 text-left text-sm text-gray-600">
                        <h3 className="font-bold text-orange-800 mb-2">💡 參訪需知</h3>
                        <ul className="list-disc list-inside space-y-1 ml-1">
                            <li>請於 <strong>一個月前</strong> 提出申請，以利聯繫及安排。</li>
                            <li>可參訪時間：週一、週三、週四、週五 09:00~16:00。</li>
                            <li>地址：台中市北屯區北屯路210號B1。</li>
                        </ul>
                    </div>
                </div>
            </div>
        );

        const FormView = ({ formData, handleChange, handleSubmit, setView, isDemoMode }) => (
            <div className="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden animate-slide-up mt-8">
                <div className="bg-orange-500 p-6 text-white flex justify-between items-center">
                    <h2 className="text-2xl font-bold flex items-center">📝 參訪申請表</h2>
                    <button type="button" onClick={() => setView('home')} className="text-white/80 hover:text-white underline text-sm">回首頁</button>
                </div>
                <form onSubmit={handleSubmit} className="p-8 space-y-8">
                    {/* 團體資料 */}
                    <section className="space-y-4">
                        <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4 flex items-center">🏢 團體資料</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">團體名稱 *</label><input required type="text" name="groupName" value={formData.groupName} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2" /></div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">團體性質 *</label>
                                <select required name="groupType" value={formData.groupType} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2">
                                    <option value="">請選擇</option><option value="公司／企業">公司／企業</option><option value="學校">學校</option><option value="政府單位">政府單位</option><option value="社福團體">社福團體</option><option value="其他">其他</option>
                                </select>
                                {formData.groupType === '其他' && <input type="text" name="groupTypeOther" value={formData.groupTypeOther} onChange={handleChange} placeholder="請說明" className="mt-2 w-full border border-gray-300 rounded-md p-2 text-sm" />}
                            </div>
                        </div>
                    </section>

                    {/* 參訪時間 */}
                    <section className="space-y-4">
                        <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4 flex items-center">📅 預定參訪時間</h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">參訪日期 *</label><input required type="date" name="visitDate" value={formData.visitDate} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2" /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">開始時間 *</label><input required type="time" name="timeStart" value={formData.timeStart} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2" min="09:00" max="16:00"/></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">結束時間 *</label><input required type="time" name="timeEnd" value={formData.timeEnd} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2" min="09:00" max="16:00"/></div>
                        </div>
                    </section>

                    {/* 聯絡人 */}
                    <section className="space-y-4">
                        <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4 flex items-center">👤 聯絡人資訊</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">聯絡人姓名 *</label><input required type="text" name="contactPerson" value={formData.contactPerson} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2" /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">職稱</label><input type="text" name="jobTitle" value={formData.jobTitle} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2" /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">聯絡電話 *</label><input required type="tel" name="phone" value={formData.phone} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2" /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Email *</label><input required type="email" name="email" value={formData.email} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2" /></div>
                        </div>
                    </section>

                    {/* 參訪細節 */}
                    <section className="space-y-4">
                        <h3 className="text-lg font-bold text-gray-800 border-b pb-2 mb-4 flex items-center">💼 參訪細節</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">參訪總人數 *</label><input required type="number" name="visitorCount" value={formData.visitorCount} onChange={handleChange} className="w-full border border-gray-300 rounded-md p-2" min="1" /></div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">身份別 (可複選) *</label>
                                <div className="space-y-2">
                                    <label className="flex items-center"><input type="checkbox" name="identity" value="一般身份別" checked={formData.identity.includes('一般身份別')} onChange={handleChange} className="mr-2" /> 一般身份別</label>
                                    <div className="flex flex-col gap-2 p-3 bg-orange-50 rounded border border-orange-100">
                                        <label className="flex items-center font-medium text-orange-800"><input type="checkbox" name="identity" value="身心障礙者" checked={formData.identity.includes('身心障礙者')} onChange={handleChange} className="mr-2" /> 身心障礙者</label>
                                        {formData.identity.includes('身心障礙者') && (
                                            <div className="ml-6 space-y-3 animate-fade-in">
                                                <div className="flex items-center gap-2"><span className="text-sm">人數：</span><input type="number" name="disabledCount" value={formData.disabledCount} onChange={handleChange} className="w-20 text-sm border rounded px-2 py-1" /></div>
                                                <select name="disabilityType" value={formData.disabilityType} onChange={handleChange} className="w-full text-sm border rounded px-2 py-1">
                                                    <option value="">請選擇障別</option><option value="聽覺障礙 (聾人)">聽覺障礙 (聾人)</option><option value="肢體障礙">肢體障礙</option><option value="其他">其他</option>
                                                </select>
                                                {formData.disabilityType === '聽覺障礙 (聾人)' && (
                                                    <div className="bg-white p-2 rounded border"><p className="text-sm mb-1">是否會手語？</p>
                                                        <div className="flex gap-4"><label className="text-sm"><input type="radio" name="signLanguage" value="會手語" checked={formData.signLanguage === '會手語'} onChange={handleChange} className="mr-1"/>會</label><label className="text-sm"><input type="radio" name="signLanguage" value="不會手語" checked={formData.signLanguage === '不會手語'} onChange={handleChange} className="mr-1"/>不會</label></div>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="bg-gray-50 p-4 rounded-md mt-4">
                            <label className="block text-sm font-medium text-gray-700 mb-2">參訪需求</label>
                            <div className="space-y-2">
                                <label className="flex items-center"><input type="checkbox" name="needs" value="認識蒙恩與工廠導覽" checked={formData.needs.includes('認識蒙恩與工廠導覽')} onChange={handleChange} className="mr-2" /> 認識蒙恩與工廠導覽</label>
                                <div className="flex items-center gap-2 flex-wrap">
                                    <label className="flex items-center"><input type="checkbox" name="needs" value="志工實作服務" checked={formData.needs.includes('志工實作服務')} onChange={handleChange} className="mr-2" /> 志工實作服務</label>
                                    {formData.needs.includes('志工實作服務') && <label className="flex items-center text-sm bg-white px-2 rounded border"><input type="checkbox" name="volunteerCert" checked={formData.volunteerCert} onChange={handleChange} className="mr-2" /> 需志工證明</label>}
                                </div>
                                <label className="flex items-center"><input type="checkbox" name="needs" value="推動企業 ESG／CSR 行動" checked={formData.needs.includes('推動企業 ESG／CSR 行動')} onChange={handleChange} className="mr-2" /> 推動企業 ESG／CSR 行動</label>
                                <div className="flex items-center">
                                    <label className="flex items-center whitespace-nowrap"><input type="checkbox" name="needs" value="其他目的" checked={formData.needs.includes('其他目的')} onChange={handleChange} className="mr-2" /> 其他：</label>
                                    {formData.needs.includes('其他目的') && <input type="text" name="needsOther" value={formData.needsOther} onChange={handleChange} className="border-b border-gray-400 bg-transparent outline-none px-2 text-sm w-full ml-2" placeholder="請說明" />}
                                </div>
                            </div>
                        </div>
                        <div className="mt-4">
                            <label className="block text-sm font-medium text-gray-700 mb-1">參訪期待</label>
                            <textarea name="expectations" value={formData.expectations} onChange={handleChange} rows="3" className="w-full border border-gray-300 rounded-md p-2"></textarea>
                        </div>
                    </section>
                    <div className="pt-4 flex justify-center"><button type="submit" className="bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-12 rounded-lg shadow-md">提交申請</button></div>
                </form>
            </div>
        );

        const SuccessView = ({ setView }) => (
            <div className="flex flex-col items-center justify-center h-[60vh] text-center"><h2 className="text-3xl font-bold mb-4">✅ 送出成功！</h2><button onClick={() => setView('home')} className="text-orange-600 underline">回首頁</button></div>
        );

        const AdminLogin = ({ handleLogin, loginData, setLoginData, setView }) => (
            <div className="flex items-center justify-center min-h-[60vh]"><div className="bg-white p-8 rounded-xl shadow-lg"><h2 className="text-2xl font-bold mb-6">🔒 後台登入</h2><form onSubmit={handleLogin} className="space-y-4"><div><label className="block text-sm mb-1">帳號</label><input type="text" value={loginData.username} onChange={e=>setLoginData({...loginData,username:e.target.value})} className="border p-2 w-full rounded"/></div><div><label className="block text-sm mb-1">密碼</label><input type="password" value={loginData.password} onChange={e=>setLoginData({...loginData,password:e.target.value})} className="border p-2 w-full rounded"/></div><button type="submit" className="w-full bg-gray-800 text-white p-2 rounded">登入</button></form><button type="button" onClick={()=>setView('home')} className="mt-4 text-sm text-gray-500 w-full text-center">返回</button></div></div>
        );

        const AdminDashboard = ({ applications, updateStatus, deleteApplication, setIsAdmin, setView }) => (
            <div className="animate-fade-in mt-8">
                <div className="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center mb-6 rounded-t-lg">
                    <h2 className="text-xl font-bold text-gray-800 flex items-center">💼 參訪申請管理後台</h2>
                    <button onClick={() => {setIsAdmin(false); setView('home');}} className="text-sm text-red-600 hover:text-red-700 font-medium">登出</button>
                </div>
                <div className="bg-white rounded-lg shadow overflow-x-auto">
                    <table className="w-full text-sm text-left text-gray-500">
                        <thead className="text-xs text-gray-700 uppercase bg-gray-50 border-b"><tr><th className="px-6 py-3">狀態</th><th className="px-6 py-3">參訪日期</th><th className="px-6 py-3">團體</th><th className="px-6 py-3">聯絡人</th><th className="px-6 py-3">需求與期待</th><th className="px-6 py-3">操作</th></tr></thead>
                        <tbody>
                            {applications.length === 0 ? <tr><td colSpan="6" className="text-center py-8">無資料</td></tr> : applications.map((app) => (
                                <tr key={app.id} className="bg-white border-b hover:bg-gray-50">
                                    <td className="px-6 py-4">
                                        <span className={`px-2 py-1 rounded text-xs whitespace-nowrap ${app.status==='pending'?'bg-yellow-100 text-yellow-800':app.status==='contacted'?'bg-blue-100 text-blue-800':app.status==='confirmed'?'bg-green-100 text-green-800':'bg-gray-100 text-gray-800'}`}>
                                            {app.status === 'pending' ? '待處理' : app.status === 'contacted' ? '已聯繫' : app.status === 'confirmed' ? '已確認' : app.status === 'rejected' ? '無法安排' : app.status}
                                        </span>
                                    </td>
                                    <td className="px-6 py-4">
                                        {app.visitDate}<br/><span className="text-xs text-gray-400">{app.timeStart}-{app.timeEnd}</span>
                                    </td>
                                    <td className="px-6 py-4 font-bold">
                                        {app.groupName}
                                        <div className="text-xs font-normal text-gray-500">{app.visitorCount}人</div>
                                        {/* 顯示詳細的身心障礙資訊 */}
                                        {app.identity && app.identity.includes('身心障礙者') && (
                                            <div className="mt-1 text-xs text-orange-600 bg-orange-50 p-1 rounded font-normal">
                                                障別: {app.disabilityType} ({app.disabledCount}人)<br/>
                                                {app.disabilityType === '聽覺障礙 (聾人)' && `手語: ${app.signLanguage}`}
                                            </div>
                                        )}
                                    </td>
                                    <td className="px-6 py-4">
                                        <div className="font-medium text-gray-800">{app.contactPerson}</div>
                                        <div className="text-xs text-gray-500">📞 {app.phone}</div>
                                        <div className="text-xs text-gray-500">✉️ {app.email}</div>
                                    </td>
                                    <td className="px-6 py-4 max-w-xs">
                                        <div className="flex flex-wrap gap-1 mb-1">
                                            {app.needs && app.needs.map((n, i) => (
                                                <span key={i} className="bg-orange-50 text-orange-600 text-[10px] px-1 rounded border border-orange-100">{n}</span>
                                            ))}
                                            {app.volunteerCert && <span className="bg-blue-50 text-blue-600 text-[10px] px-1 rounded border border-blue-100">需志工證</span>}
                                        </div>
                                        {app.expectations && (
                                            <p className="text-gray-500 text-xs mt-1 whitespace-pre-wrap">{app.expectations}</p>
                                        )}
                                    </td>
                                    <td className="px-6 py-4 flex flex-col gap-2">
                                        <select value={app.status} onChange={(e) => updateStatus(app.id, e.target.value)} className="border rounded p-1 text-xs w-full">
                                            <option value="pending">待處理</option>
                                            <option value="contacted">已聯繫</option>
                                            <option value="confirmed">已確認</option>
                                            <option value="rejected">無法安排</option>
                                        </select>
                                        <button onClick={() => deleteApplication(app.id)} className="w-full text-xs text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 py-1 rounded transition-colors">
                                            刪除
                                        </button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        const VisitSystem = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); 
            const [applications, setApplications] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [notification, setNotification] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isDemoMode, setIsDemoMode] = useState(false);
            const [configError, setConfigError] = useState(null);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        setConfigError(null);
                    } else {
                        signInAnonymously(auth).catch((error) => {
                            console.error("匿名登入失敗:", error);
                            setIsDemoMode(true);
                            setUser({ uid: 'demo-user', isAnonymous: true });
                            if (error.code === 'auth/unauthorized-domain') {
                                setConfigError(`網域未授權：請至 Firebase Console 新增網址：${window.location.hostname}`);
                            }
                            showNotification("偵測到設定問題，已切換至本機演示模式", "warning");
                        });
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (isDemoMode || !isAdmin || (!user && !isDemoMode)) {
                    setLoading(false);
                    return;
                }
                const q = query(collection(db, COLLECTION_NAME), orderBy('submitDate', 'desc'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                        const apps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setApplications(apps);
                        setLoading(false);
                    }, (error) => {
                        if (error.code === 'permission-denied') showNotification("權限不足", "error");
                        setLoading(false);
                    });
                return () => unsubscribe();
            }, [isAdmin, user, isDemoMode]);

            const [formData, setFormData] = useState({
                groupName: '', groupType: '', groupTypeOther: '',
                visitDate: '', timeStart: '', timeEnd: '',
                contactPerson: '', jobTitle: '', phone: '', email: '',
                visitorCount: '', identity: [], disabledCount: '',
                disabilityType: '', signLanguage: '',   
                needs: [], needsOther: '', volunteerCert: false, expectations: ''
            });

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                if (type === 'checkbox') {
                    if (name === 'volunteerCert') {
                        setFormData(prev => ({ ...prev, [name]: checked }));
                    } else if (name === 'needs' || name === 'identity') {
                        const val = value;
                        setFormData(prev => {
                            const currentList = prev[name] || []; 
                            const newList = checked ? [...currentList, val] : currentList.filter(item => item !== val);
                            if (name === 'identity' && val === '身心障礙者' && !checked) {
                                return { ...prev, [name]: newList, disabledCount: '', disabilityType: '', signLanguage: '' };
                            }
                            return { ...prev, [name]: newList };
                        });
                    }
                } else {
                    setFormData(prev => ({ ...prev, [name]: value }));
                }
            };

            const sendNotificationEmail = async (data) => {
                if (!GOOGLE_SCRIPT_URL) return;
                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(data)
                    });
                } catch (error) {
                    console.error("Fetch request failed:", error);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const today = new Date();
                const visitDate = new Date(formData.visitDate);
                const diffDays = Math.ceil(Math.abs(visitDate - today) / (1000 * 60 * 60 * 24));
                
                if (diffDays < 30) {
                    if(!window.confirm("提醒您：參訪建議於一個月前申請以利安排。您確定要送出嗎？")) return;
                }
                if (formData.identity.length === 0) {
                    showNotification('請至少選擇一種參訪人身份別', 'error'); return;
                }
                if (formData.identity.includes('身心障礙者') && !formData.disabilityType) {
                    showNotification('請選擇身心障礙類別', 'error'); return;
                }

                const newApp = {
                    submitDate: new Date().toISOString().split('T')[0],
                    createdAt: new Date().toISOString(),
                    ...formData,
                    groupType: formData.groupType === '其他' ? formData.groupTypeOther : formData.groupType,
                    needs: formData.needs.includes('其他目的') ? [...formData.needs.filter(n => n !== '其他目的'), formData.needsOther] : formData.needs,
                    status: 'pending'
                };

                if (isDemoMode) {
                    newApp.id = Date.now().toString();
                    setApplications(prev => [newApp, ...prev]);
                    showNotification('演示模式：已暫存並嘗試模擬寄信', 'warning');
                    sendNotificationEmail(newApp); 
                    setView('success');
                    resetForm();
                } else {
                    try {
                        await addDoc(collection(db, COLLECTION_NAME), newApp);
                        await sendNotificationEmail(newApp);
                        showNotification('申請已送出！我們會盡快與您聯繫。');
                        setView('success');
                        resetForm();
                    } catch (error) {
                        showNotification("送出失敗，請檢查網路", "error");
                    }
                }
            };

            const resetForm = () => {
                setFormData({
                    groupName: '', groupType: '', groupTypeOther: '',
                    visitDate: '', timeStart: '', timeEnd: '',
                    contactPerson: '', jobTitle: '', phone: '', email: '',
                    visitorCount: '', identity: [], disabledCount: '',
                    disabilityType: '', signLanguage: '',
                    needs: [], needsOther: '', volunteerCert: false, expectations: ''
                });
            };

            const [loginData, setLoginData] = useState({ username: '', password: '' });
            const handleLogin = (e) => {
                e.preventDefault();
                if (loginData.username === 'admin' && loginData.password === '22335678') {
                    setIsAdmin(true); setView('admin-dashboard');
                } else {
                    showNotification('帳號或密碼錯誤', 'error');
                }
            };

            const updateStatus = async (id, newStatus) => {
                if (isDemoMode) {
                    setApplications(apps => apps.map(app => app.id === id ? { ...app, status: newStatus } : app));
                    return;
                }
                try {
                    await updateDoc(doc(db, COLLECTION_NAME, id), { status: newStatus });
                    showNotification(`狀態更新成功`);
                } catch (error) {
                    showNotification("更新失敗", "error");
                }
            };

            // 新增：刪除申請資料的功能
            const deleteApplication = async (id) => {
                if (!window.confirm("確定要刪除這筆申請嗎？此動作無法復原。")) return;
                
                if (isDemoMode) {
                    setApplications(apps => apps.filter(app => app.id !== id));
                    showNotification("已刪除 (演示模式)");
                    return;
                }

                try {
                    await deleteDoc(doc(db, COLLECTION_NAME, id));
                    showNotification("資料已刪除");
                } catch (error) {
                    console.error("Delete error:", error);
                    if (error.code === 'permission-denied') {
                        showNotification("刪除失敗：權限不足 (請檢查 Firestore 規則)", "error");
                    } else {
                        showNotification("刪除失敗", "error");
                    }
                }
            };

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b px-4 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center text-xl font-bold text-gray-800 cursor-pointer" onClick={()=>setView('home')}>❤️ 蒙恩聽障烘焙坊</div>
                    </nav>
                    {notification && <div className={`fixed top-20 right-4 p-4 rounded shadow-lg text-white z-50 ${notification.type==='error'?'bg-red-500':'bg-green-500'}`}>{notification.message}</div>}
                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {view === 'home' && <HomeView setView={setView} configError={configError} />}
                        {view === 'form' && <FormView formData={formData} handleChange={handleChange} handleSubmit={handleSubmit} setView={setView} isDemoMode={isDemoMode} />}
                        {view === 'success' && <SuccessView setView={setView} />}
                        {view === 'admin-login' && <AdminLogin handleLogin={handleLogin} loginData={loginData} setLoginData={setLoginData} setView={setView} />}
                        {view === 'admin-dashboard' && <AdminDashboard applications={applications} updateStatus={updateStatus} deleteApplication={deleteApplication} setIsAdmin={setIsAdmin} setView={setView} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<VisitSystem />);
    </script>
</body>
</html>
